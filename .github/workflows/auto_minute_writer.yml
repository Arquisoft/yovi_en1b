name: Auto Minute Writer

on:
  schedule:
    - cron: '30 11 * * 1'
  workflow_dispatch:
    inputs:
      meeting_number:
        description: 'Meeting Number (e.g. 11)'
        required: false
      date:
        description: 'Date (e.g. 13 04 2026)'
        required: false
      time:
        description: 'Time (e.g. 12:25-13:00)'
        required: false
      writer:
        description: 'Writer (e.g. [Ahmet Bilal Yazicioglu](https://github.com/bilalyazicioglu))'
        required: false
      decisions:
        description: 'Taken decisions (or None)'
        required: false
        default: 'None'
      priorities:
        description: 'Priorities'
        required: false
        default: 'Finish high priority tasks'

permissions:
  contents: write

jobs:
  create-minute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve minute metadata
        run: |
          mkdir -p wiki

          if [ -z "${{ github.event.inputs.meeting_number }}" ]; then
            LAST=$(ls wiki/Minute-*.md 2>/dev/null | grep -oP '(?<=Minute-)\d+' | sort -n | tail -1)
            MEETING_NUMBER=$(( ${LAST:-0} + 1 ))
            DATE=$(date +"%d %m %Y")
            TIME="11:30-12:00"
            WRITER="Auto Minute Writer"
            DECISIONS="None"
            PRIORITIES="Finish high priority tasks"
          else
            MEETING_NUMBER="${{ github.event.inputs.meeting_number }}"
            DATE="${{ github.event.inputs.date }}"
            TIME="${{ github.event.inputs.time }}"
            WRITER="${{ github.event.inputs.writer }}"
            DECISIONS="${{ github.event.inputs.decisions }}"
            PRIORITIES="${{ github.event.inputs.priorities }}"
          fi

          echo "MEETING_NUMBER=${MEETING_NUMBER}" >> "$GITHUB_ENV"
          echo "DATE=${DATE}"                     >> "$GITHUB_ENV"
          echo "TIME=${TIME}"                     >> "$GITHUB_ENV"
          echo "WRITER=${WRITER}"                 >> "$GITHUB_ENV"
          echo "DECISIONS=${DECISIONS}"           >> "$GITHUB_ENV"
          echo "PRIORITIES=${PRIORITIES}"         >> "$GITHUB_ENV"

      - name: Create Minute Document
        run: |
          FILE_PATH="wiki/Minute-${MEETING_NUMBER} ${DATE}.md"

          {
            echo "# ${MEETING_NUMBER}. Meeting - ${DATE}"
            echo ""
            echo "${DATE// //}, ${TIME}, written by ${WRITER}"
            echo ""
            echo "## Participants"
            echo "- [ ] [Ahmet Bilal Yazicioglu](https://github.com/bilalyazicioglu)"
            echo "- [ ] [Tobias Navrat](https://github.com/Th0be)"
            echo "- [ ] [Ignacio Hoyos Diego](https://github.com/nacho50900)"
            echo "- [ ] [Alejandro de San Claudio Mesa](https://github.com/UO300896)"
            echo ""
            echo "## Taken decisions"
            echo ""
            echo "${DECISIONS}"
            echo ""
            echo "## Priorities"
            echo ""
            echo "${PRIORITIES}"
            echo ""
            echo "## New tasks/issues"
            echo "- Add tasks here..."
            echo ""
            echo "## Closed Tasks/Issues"
            echo "- Add closed tasks here..."
          } > "$FILE_PATH"

          echo "Created: $FILE_PATH"
          cat "$FILE_PATH"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add wiki/
          if git diff --cached --quiet; then
            echo "Nothing to commit — file already exists with identical content."
            exit 0
          fi
          git commit -m "docs: Add minute ${MEETING_NUMBER}"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}
